<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
}

/* MAIN BOX */
.container{
    width:350px;
    background:#111827;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* RADIO BUTTONS HIDE */
input[type="radio"]{
    display:none;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:space-around;
    margin-bottom:20px;
}

.tabs label{
    color:white;
    cursor:pointer;
    padding:10px;
    width:50%;
    text-align:center;
    background:#1e293b;
    border-radius:8px;
    transition:0.3s;
}

#login:checked ~ .tabs label[for="login"],
#signup:checked ~ .tabs label[for="signup"]{
    background:#38bdf8;
    color:black;
    font-weight:bold;
}

/* FORMS */
.form{
    display:none;
    flex-direction:column;
    gap:12px;
}

input[type="radio"]#login:checked ~ .login-form{
    display:flex;
}

input[type="radio"]#signup:checked ~ .signup-form{
    display:flex;
}

.form input{
    padding:10px;
    border:none;
    outline:none;
    border-radius:6px;
    background:#1e293b;
    color:white;
}

.form button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

.form button:hover{
    background:#0ea5e9;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- RADIO BUTTONS -->
    <input type="radio" id="login" name="tab" checked>
    <input type="radio" id="signup" name="tab">

    <!-- TITLE -->
    <h2>Welcome</h2>

    <!-- TABS -->
    <div class="tabs">
        <label for="login">Login</label>
        <label for="signup">Signup</label>
    </div>

    <!-- LOGIN FORM -->
    <div class="form login-form">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form signup-form">
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Signup</button>
    </div>

</div>

</body>
</html>
